<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" fill="none">
  <defs>
    <!-- Color Gradients -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8e7c9" />
      <stop offset="50%" stop-color="#b79552" />
      <stop offset="100%" stop-color="#80612c" />
    </linearGradient>
    
    <linearGradient id="vermilion-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8a29b" />
      <stop offset="50%" stop-color="#a83f39" />
      <stop offset="100%" stop-color="#70201c" />
    </linearGradient>
    
    <linearGradient id="jade-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8bc79b" />
      <stop offset="50%" stop-color="#3a6044" />
      <stop offset="100%" stop-color="#1e3824" />
    </linearGradient>
    
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1c1236" />
      <stop offset="70%" stop-color="#0c071d" />
      <stop offset="100%" stop-color="#04020a" />
    </radialGradient>

    <radialGradient id="star-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffedd5" stop-opacity="1" />
      <stop offset="40%" stop-color="#b79552" stop-opacity="0.8" />
      <stop offset="70%" stop-color="#a83f39" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#a83f39" stop-opacity="0" />
    </radialGradient>

    <!-- Filters for Glow Effects -->
    <filter id="subtle-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <filter id="bg-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
    </filter>

    <!-- Bagua Bar Components -->
    <!-- Solid bar: width 20 (span [-11, 11] with round caps), height 2 -->
    <path id="solid-bar" d="M -10 -1 h 20 a 1 1 0 0 1 0 2 h -20 a 1 1 0 0 1 0 -2 Z" />
    
    <!-- Broken bar: two halves of width 8 (spans [-11, -1] and [1, 11]), gap 2 -->
    <g id="broken-bar">
      <path d="M -10 -1 h 8 a 1 1 0 0 1 0 2 h -8 a 1 1 0 0 1 0 -2 Z" />
      <path d="M 2 -1 h 8 a 1 1 0 0 1 0 2 h -8 a 1 1 0 0 1 0 -2 Z" />
    </g>

    <!-- The 8 Trigram definitions -->
    <!-- 1. 坤 (Kun - North/Top - 0°): ☷ -->
    <g id="tg-kun">
      <use href="#broken-bar" y="-6" />
      <use href="#broken-bar" y="0" />
      <use href="#broken-bar" y="6" />
    </g>
    
    <!-- 2. 震 (Zhen - Northeast - 45°): ☳ -->
    <g id="tg-zhen">
      <use href="#broken-bar" y="-6" />
      <use href="#broken-bar" y="0" />
      <use href="#solid-bar" y="6" />
    </g>
    
    <!-- 3. 離 (Li - East - 90°): ☲ -->
    <g id="tg-li">
      <use href="#solid-bar" y="-6" />
      <use href="#broken-bar" y="0" />
      <use href="#solid-bar" y="6" />
    </g>
    
    <!-- 4. 兌 (Dui - Southeast - 135°): ☱ -->
    <g id="tg-dui">
      <use href="#broken-bar" y="-6" />
      <use href="#solid-bar" y="0" />
      <use href="#solid-bar" y="6" />
    </g>
    
    <!-- 5. 乾 (Qian - South/Bottom - 180°): ☰ -->
    <g id="tg-qian">
      <use href="#solid-bar" y="-6" />
      <use href="#solid-bar" y="0" />
      <use href="#solid-bar" y="6" />
    </g>
    
    <!-- 6. 巽 (Xun - Southwest - 225°): ☴ -->
    <g id="tg-xun">
      <use href="#solid-bar" y="-6" />
      <use href="#solid-bar" y="0" />
      <use href="#broken-bar" y="6" />
    </g>
    
    <!-- 7. 坎 (Kan - West - 270°): ☵ -->
    <g id="tg-kan">
      <use href="#broken-bar" y="-6" />
      <use href="#solid-bar" y="0" />
      <use href="#broken-bar" y="6" />
    </g>
    
    <!-- 8. 艮 (Gen - Northwest - 315°): ☶ -->
    <g id="tg-gen">
      <use href="#solid-bar" y="-6" />
      <use href="#broken-bar" y="0" />
      <use href="#broken-bar" y="6" />
    </g>
  </defs>

  <!-- 1. Background Shell -->
  <circle cx="100" cy="100" r="98" fill="url(#bg-grad)" stroke="url(#gold-grad)" stroke-width="1.2" />
  
  <!-- Outer Decorative Ring -->
  <circle cx="100" cy="100" r="94" fill="none" stroke="url(#gold-grad)" stroke-width="0.5" stroke-opacity="0.3" />
  <!-- Astrolabe Dial Ticks -->
  <circle cx="100" cy="100" r="91" fill="none" stroke="url(#gold-grad)" stroke-width="1.5" stroke-dasharray="1 3.5" stroke-opacity="0.4" />
  <circle cx="100" cy="100" r="88" fill="none" stroke="url(#gold-grad)" stroke-width="0.5" stroke-opacity="0.3" />

  <!-- 2. Constellations (Zi Wei North & South Dippers) -->
  <!-- North Dipper (北斗七星) - Top Left -->
  <g stroke="url(#gold-grad)" stroke-width="0.6" stroke-opacity="0.18" fill="none">
    <path d="M 45 42 L 56 38 L 65 44 L 75 48 L 82 62 L 77 75 L 86 85" />
  </g>
  <!-- North Dipper Stars -->
  <g fill="#fff" opacity="0.8">
    <circle cx="45" cy="42" r="1.2" />
    <circle cx="56" cy="38" r="1.2" />
    <circle cx="65" cy="44" r="1.2" />
    <circle cx="75" cy="48" r="1.2" />
    <circle cx="82" cy="62" r="1.2" />
    <circle cx="77" cy="75" r="1.2" />
    <circle cx="86" cy="85" r="1.8" fill="url(#gold-grad)" filter="url(#subtle-glow)" /> <!-- Polaris-proxy -->
  </g>

  <!-- South Dipper (南斗六星) - Bottom Right -->
  <g stroke="url(#gold-grad)" stroke-width="0.6" stroke-opacity="0.18" fill="none">
    <path d="M 116 128 L 128 132 L 138 124 L 148 134 L 155 146 L 146 158" />
  </g>
  <!-- South Dipper Stars -->
  <g fill="#fff" opacity="0.7">
    <circle cx="116" cy="128" r="1.2" />
    <circle cx="128" cy="132" r="1.2" />
    <circle cx="138" cy="124" r="1.2" />
    <circle cx="148" cy="134" r="1.2" />
    <circle cx="155" cy="146" r="1.2" />
    <circle cx="146" cy="158" r="1.2" />
  </g>

  <!-- 3. Planetary Orbits (Mayan cycles / Cosmic flow) -->
  <ellipse cx="100" cy="100" rx="80" ry="34" fill="none" stroke="url(#jade-grad)" stroke-width="0.75" stroke-opacity="0.25" stroke-dasharray="3 3" transform="rotate(-28 100 100)" />
  <ellipse cx="100" cy="100" rx="84" ry="40" fill="none" stroke="url(#vermilion-grad)" stroke-width="0.7" stroke-opacity="0.2" stroke-dasharray="6 3" transform="rotate(32 100 100)" />
  
  <!-- Orbit Planets -->
  <circle cx="50" cy="115" r="2.2" fill="url(#jade-grad)" filter="url(#subtle-glow)" />
  <circle cx="158" cy="72" r="2.2" fill="url(#vermilion-grad)" filter="url(#subtle-glow)" />
  <circle cx="132" cy="78" r="1.8" fill="url(#gold-grad)" opacity="0.8" />

  <!-- 4. Life Numerology Outer Dial (Numbers 1-9) -->
  <g font-family="'Inter', 'Noto Sans TC', system-ui, sans-serif" font-size="6.5" font-weight="600" fill="url(#gold-grad)" text-anchor="middle" opacity="0.75">
    <text transform="translate(100, 100) rotate(0) translate(0, -76) rotate(0)">1</text>
    <text transform="translate(100, 100) rotate(40) translate(0, -76) rotate(-40)">2</text>
    <text transform="translate(100, 100) rotate(80) translate(0, -76) rotate(-80)">3</text>
    <text transform="translate(100, 100) rotate(120) translate(0, -76) rotate(-120)">4</text>
    <text transform="translate(100, 100) rotate(160) translate(0, -76) rotate(-160)">5</text>
    <text transform="translate(100, 100) rotate(200) translate(0, -76) rotate(-200)">6</text>
    <text transform="translate(100, 100) rotate(240) translate(0, -76) rotate(-240)">7</text>
    <text transform="translate(100, 100) rotate(280) translate(0, -76) rotate(-280)">8</text>
    <text transform="translate(100, 100) rotate(320) translate(0, -76) rotate(-320)">9</text>
  </g>
  
  <!-- Dial Inner Border -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="url(#gold-grad)" stroke-width="0.5" stroke-opacity="0.25" />

  <!-- 5. Bagua Ring (Earlier Heaven Bagua layout at R=59) -->
  <g fill="url(#gold-grad)" opacity="0.85">
    <!-- North: Kun 坤 (0°) -->
    <use href="#tg-kun" transform="translate(100, 100) rotate(0) translate(0, -59)" />
    <!-- Northeast: Zhen 震 (45°) -->
    <use href="#tg-zhen" transform="translate(100, 100) rotate(45) translate(0, -59)" />
    <!-- East: Li 離 (90°) -->
    <use href="#tg-li" transform="translate(100, 100) rotate(90) translate(0, -59)" />
    <!-- Southeast: Dui 兌 (135°) -->
    <use href="#tg-dui" transform="translate(100, 100) rotate(135) translate(0, -59)" />
    <!-- South: Qian 乾 (180°) -->
    <use href="#tg-qian" transform="translate(100, 100) rotate(180) translate(0, -59)" />
    <!-- Southwest: Xun 巽 (225°) -->
    <use href="#tg-xun" transform="translate(100, 100) rotate(225) translate(0, -59)" />
    <!-- West: Kan 坎 (270°) -->
    <use href="#tg-kan" transform="translate(100, 100) rotate(270) translate(0, -59)" />
    <!-- Northwest: Gen 艮 (315°) -->
    <use href="#tg-gen" transform="translate(100, 100) rotate(315) translate(0, -59)" />
  </g>
  
  <!-- Bagua Inner Boundary -->
  <circle cx="100" cy="100" r="48" fill="none" stroke="url(#gold-grad)" stroke-width="0.6" stroke-opacity="0.3" />

  <!-- 6. Central Polaris Star (紫微星) & Yin-Yang Hub -->
  <!-- Ambient Center Glow -->
  <circle cx="100" cy="100" r="32" fill="url(#star-glow)" opacity="0.6" filter="url(#bg-glow)" />

  <!-- Outer Star (Gold 4-pointed curved star) -->
  <path d="M 100 66 Q 100 100 134 100 Q 100 100 100 134 Q 100 100 66 100 Q 100 100 100 66 Z" fill="url(#gold-grad)" filter="url(#subtle-glow)" />

  <!-- Inner Star (Vermilion 4-pointed curved star, rotated 45°) -->
  <path d="M 0 -22 Q 0 0 22 0 Q 0 0 0 22 Q 0 0 -22 0 Q 0 0 0 -22 Z" fill="url(#vermilion-grad)" transform="translate(100, 100) rotate(45)" />

  <!-- Central Yin-Yang Core -->
  <circle cx="100" cy="100" r="10.5" fill="none" stroke="url(#gold-grad)" stroke-width="0.5" />
  <g transform="translate(100, 100) scale(0.95)">
    <!-- Right Teardrop (Gold) -->
    <path d="M 0 -11 A 5.5 5.5 0 0 1 0 0 A 5.5 5.5 0 0 0 0 11 A 11 11 0 0 0 0 -11" fill="url(#gold-grad)" />
    <!-- Left Teardrop (Vermilion, rotated 180) -->
    <path d="M 0 -11 A 5.5 5.5 0 0 1 0 0 A 5.5 5.5 0 0 0 0 11 A 11 11 0 0 0 0 -11" fill="url(#vermilion-grad)" transform="rotate(180)" />
    <!-- Yin/Yang Eyes -->
    <circle cx="0" cy="-5.5" r="1.6" fill="url(#vermilion-grad)" />
    <circle cx="0" cy="5.5" r="1.6" fill="url(#gold-grad)" />
  </g>
</svg>
