<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="命理綜合分析平台 — 紫微斗數、八字、數字學多引擎命理分析系統" />
    <meta name="theme-color" content="#0a0e1a" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <title>命理綜合分析平台</title>
  </head>
  <body>
    <!-- ═══════════════════════════════════════════
         Background ambient glow layers
    ═══════════════════════════════════════════ -->
    <div id="ambient-glow" aria-hidden="true">
      <div class="glow-orb glow-orb--purple"></div>
      <div class="glow-orb glow-orb--blue"></div>
      <div class="glow-orb glow-orb--amber"></div>
    </div>

    <!-- ═══════════════════════════════════════════
         Main Application Shell
    ═══════════════════════════════════════════ -->
    <div id="app">

      <!-- ─── Header ─── -->
      <header id="app-header" class="app-header">
        <div class="header-inner container">
          <div class="header-brand">
            <span class="brand-icon" aria-hidden="true">☰</span>
            <h1 class="brand-title">
              <span class="brand-glyph" aria-hidden="true">✦</span>
              命理綜合分析平台
            </h1>
          </div>
          <nav class="header-nav" aria-label="主導航">
            <span class="header-badge">多引擎 · 綜合分析</span>
          </nav>
        </div>
      </header>

      <!-- ─── Main Content ─── -->
      <main id="app-main" class="app-main container">

        <!-- Input Section -->
        <section id="input-section" class="input-section" aria-label="出生資料輸入">
          <div class="section-intro">
            <h2 class="section-title">
              <span class="title-accent" aria-hidden="true">◈</span>
              輸入出生資料
            </h2>
            <p class="section-subtitle">請輸入您的出生資訊，系統將透過紫微斗數、八字、數字學等多引擎進行綜合命理分析</p>
          </div>
          <div id="input-form-container"></div>
        </section>

        <!-- Report Section (hidden initially) -->
        <section id="report-section" class="report-section" aria-label="命理分析報告" hidden>
          <div id="report-container"></div>
        </section>

      </main>

      <!-- ─── Footer ─── -->
      <footer id="app-footer" class="app-footer">
        <div class="footer-inner container">
          <p class="footer-text">
            命理綜合分析平台 &copy; 2026 — 僅供參考，不構成任何決策建議
          </p>
          <p class="footer-disclaimer">
            所有分析結果均帶有「⚠️ 待驗證」標記，使用者應保持理性判斷
          </p>
        </div>
      </footer>

    </div>

    <!-- ─── Loading Overlay ─── -->
    <div id="loading-overlay" class="loading-overlay" hidden aria-live="polite">
      <div class="loading-spinner">
        <div class="spinner-ring"></div>
        <p class="loading-text">命理引擎計算中…</p>
      </div>
    </div>

    <!-- ─── Toast Container ─── -->
    <div id="toast-container" class="toast-container" aria-live="polite"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
